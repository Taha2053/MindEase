<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindEase — Welcome</title>
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>
  <div class="container" id="app" role="main" aria-live="polite">
    <div class="brand">
      <div class="brand-icon">&#x1F9E0;</div>
      <div>
        <div class="brand-name">MindEase</div>
        <div class="brand-tagline">Adaptive Learning</div>
      </div>
    </div>
    <div class="progress-track" id="step-indicator" aria-hidden="true"></div>
    <div class="card" id="card">
      <div class="step-num" id="step-num">STEP 1 OF 5</div>
      <h1 id="title" class="question">How do you learn best?</h1>
      <p id="subtitle" class="question-sub">Select the option that best describes you.</p>
      <div id="options-container" class="options" role="radiogroup"></div>
      <div id="nav" class="nav">
        <button id="prev-btn" class="btn-back" disabled>&larr; Back</button>
        <button id="next-btn" class="btn-next">Next &rarr;</button>
      </div>
    </div>
  </div>
  <script type="module" src="onboarding.ts"></script>
</body>
</html>

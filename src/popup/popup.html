<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindEase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root, [data-theme="dark"] {
        --bg-base:        #080f1a;
        --bg-surface:     #0d1829;
        --bg-surface-alt: #0a1422;
        --border:         #1a2d45;
        --border-hover:   #2a4a6a;
        --border-focus:   #4EB8FF;
        --text-primary:   #e8edf5;
        --text-dim:       #64748b;
        --text-muted:     #475569;
        --accent:         #4EB8FF;
        --accent-secondary: #7B6FFF;
        --accent-gradient:  linear-gradient(135deg, #4EB8FF, #7B6FFF);
        --danger:         #ef4444;
        --success:        #22c55e;
        --warning:        #eab308;
        --font-family:    'Inter', system-ui, -apple-system, sans-serif;
        --shadow-glow:    0 8px 24px rgba(78,184,255,0.3);
      }

      [data-theme="light"] {
        --bg-base:        #f5f7fa;
        --bg-surface:     #ffffff;
        --bg-surface-alt: #f0f2f5;
        --border:         #d0d7de;
        --border-hover:   #8b949e;
        --border-focus:   #3b82f6;
        --text-primary:   #1a2332;
        --text-dim:       #6b7280;
        --text-muted:     #9ca3af;
        --accent:         #3b82f6;
        --accent-secondary: #8b5cf6;
        --accent-gradient:  linear-gradient(135deg, #3b82f6, #8b5cf6);
        --danger:         #dc2626;
        --success:        #16a34a;
        --warning:        #ca8a04;
        --font-family:    'Inter', system-ui, -apple-system, sans-serif;
        --shadow-glow:    0 8px 24px rgba(59,130,246,0.3);
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      body {
        width: 360px;
        max-height: 560px;
        overflow-y: auto;
        font-family: var(--font-family);
        background: var(--bg-base);
        color: var(--text-primary);
        transition: background 0.3s, color 0.3s;
      }

      body::-webkit-scrollbar { width: 4px; }
      body::-webkit-scrollbar-track { background: transparent; }
      body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .header {
        background: linear-gradient(135deg, var(--bg-surface), var(--bg-surface));
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-logo {
        width: 32px; height: 32px;
        background: var(--accent-gradient);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }

      .header-text { flex: 1; }
      .header-title {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .header-sub {
        font-size: 0.65rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 500;
      }

      .theme-toggle-popup {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        width: 30px; height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.15s;
        color: var(--text-primary);
        flex-shrink: 0;
      }
      .theme-toggle-popup:hover {
        border-color: var(--border-hover);
      }

      .body-wrap { padding: 16px; }

      .stats-row {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .stat-card {
        flex: 1;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 6px;
        text-align: center;
      }
      .stat-card .num {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text-primary);
        display: block;
      }
      .stat-card .label {
        font-size: 0.6rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-top: 4px;
      }

      .section-title {
        font-size: 0.65rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 16px 0 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .section-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .profile-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
      }

      .profile-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .profile-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .profile-item .pi-label {
        font-size: 0.6rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .profile-item .pi-value {
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--accent);
      }

      .scroll-list {
        max-height: 180px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .scroll-list::-webkit-scrollbar { width: 4px; }
      .scroll-list::-webkit-scrollbar-track { background: transparent; }
      .scroll-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .item-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .item-card .ic-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .item-card .ic-concept {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-primary);
      }
      .item-card .ic-body {
        font-size: 0.72rem;
        color: var(--text-dim);
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .badge {
        font-size: 0.55rem;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .badge-review { background: rgba(234,179,8,0.15); color: var(--warning); }
      .badge-skipped { background: rgba(220,38,38,0.15); color: var(--danger); }
      .badge-skimmed { background: rgba(234,179,8,0.15); color: var(--warning); }
      .badge-rushed { background: rgba(234,88,12,0.15); color: #f97316; }

      .btn-group {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 0.78rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--font-family);
      }
      .btn:focus-visible {
        outline: 2px solid var(--border-focus);
        outline-offset: 2px;
      }
      .btn-primary {
        background: var(--accent-gradient);
        color: var(--bg-base);
        font-weight: 600;
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-ghost {
        background: transparent;
        color: var(--text-dim);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { color: var(--text-primary); border-color: var(--border-hover); }
      .btn-danger {
        background: transparent;
        color: var(--danger);
        border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      }
      .btn-danger:hover { border-color: var(--danger); background: color-mix(in srgb, var(--danger) 6%, transparent); }

      .waiting {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 200px;
        padding: 48px 24px;
        text-align: center;
      }
      .waiting .w-icon {
        font-size: 2rem;
        margin-bottom: 12px;
      }
      .waiting .w-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .waiting .w-sub {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .hr { height: 1px; background: var(--border); margin: 12px 0; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">&#x1F9E0;</div>
      <div class="header-text">
        <div class="header-title">MindEase</div>
        <div class="header-sub">Adaptive Learning</div>
      </div>
      <button class="theme-toggle-popup" id="theme-toggle" aria-label="Toggle theme">&#x2600;&#xFE0F;</button>
    </div>
    <div class="body-wrap" id="app"></div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
